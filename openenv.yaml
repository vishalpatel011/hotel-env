name: hotel-booking-env
description: A real-world hotel booking simulation environment
version: 1.0

env: env.environment:HotelEnv

actions:
  - check_availability
  - book_room
  - cancel_booking

observation:
  rooms: list
  bookings: list
  request: object

reward_range: [0.0, 1.0]

tasks:
  - name: easy
    description: Book any available room
    grader: env.grader:grade_easy

  - name: medium
    description: Book correct room type
    grader: env.grader:grade_medium

  - name: hard
    description: Handle booking and cancellation properly
    grader: env.grader:grade_hard