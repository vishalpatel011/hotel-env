spec_version: 1
name: hotel-booking-env
type: space
runtime: fastapi
app: server.app:app

tasks:
  - id: easy
    difficulty: easy
    description: "Basic hotel booking task"
    grader:
      type: llm
      output_key: score
      prompt_template: |
        You are a grader. Return a score strictly between 0.01 and 0.99.

  - id: medium
    difficulty: medium
    description: "Intermediate hotel booking task"
    grader:
      type: llm
      output_key: score
      prompt_template: |
        You are a grader. Return a score strictly between 0.01 and 0.99.

  - id: hard
    difficulty: hard
    description: "Complex hotel booking task"
    grader:
      type: llm
      output_key: score
      prompt_template: |
        You are a grader. Return a score strictly between 0.01 and 0.99.